<div class="game-header">
  <span class="game-title">Gnome Adventure</span>
  <button class="fullscreen-btn" (click)="toggleFullscreen()" aria-label="Toggle fullscreen">
    <svg viewBox="0 0 24 24" width="24" height="24">
      <path fill="currentColor" d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
    </svg>
  </button>
</div>
<div class="canvas-container" [class.horizontal]="isHorizontal" [class.vertical]="!isHorizontal">
  <app-map (locationClicked)="handleLocationChange($event)"></app-map>
  <app-interactions></app-interactions>
</div>
